<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fitinerary — Saved</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#FF6BB5" />
  <link rel="icon" href="icon-192.png" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Fitinerary" />
  <style>
    .page { max-width: 860px; margin: 0 auto; padding: 1.5rem 1.5rem 4rem; }
    .sec-title { font-family: "Pacifico", cursive; font-size: 1.6rem; margin: 1.8rem 0 1rem; }
    .empty { color: #7a6a58; font-weight: 600; background: #fff; border: var(--border); border-radius: 16px; padding: 1.2rem 1.3rem; box-shadow: var(--shadow); }
    .trip-card { display: flex; align-items: center; gap: 1rem; background: #fff; border: var(--border); border-radius: 16px; box-shadow: var(--shadow); padding: 0.9rem 1.1rem; margin-bottom: 0.8rem; }
    .tc-emoji { font-size: 1.9rem; }
    .tc-main { flex: 1; min-width: 0; }
    .tc-dest { font-family: "Pacifico", cursive; font-size: 1.2rem; }
    .tc-dates { font-size: 0.85rem; color: #7a6a58; font-weight: 600; }
    .tc-tags { font-size: 0.72rem; color: var(--purple); font-weight: 700; margin-top: 0.15rem; text-transform: capitalize; }
    .tc-open { background: var(--teal); border: var(--border); border-radius: 10px; font-family: "Nunito", sans-serif; font-weight: 900; padding: 0.5rem 1rem; cursor: pointer; box-shadow: var(--shadow); text-decoration: none; color: var(--ink); white-space: nowrap; }
    .tc-rm { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: #c0392b; padding: 0.2rem; }
    .fav-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 0.8rem; }
    .fav-wrap { position: relative; }
    .fav-card { display: block; background: #fff; border: var(--border); border-radius: 14px; box-shadow: var(--shadow); overflow: hidden; text-decoration: none; color: var(--ink); }
    .fav-img { width: 100%; aspect-ratio: 3/4; background-size: cover; background-position: center top; background-color: #f3ece0; border-bottom: 2px solid var(--ink); }
    .fav-info { padding: 0.5rem 0.6rem 0.6rem; }
    .fav-name { display: block; font-size: 0.78rem; font-weight: 700; line-height: 1.25; height: 2.5em; overflow: hidden; }
    .fav-meta { display: flex; justify-content: space-between; align-items: center; margin-top: 0.3rem; }
    .fav-price { font-weight: 900; color: var(--coral, #e8703a); font-size: 0.82rem; }
    .fav-store { font-size: 0.6rem; color: #aaa; text-transform: uppercase; font-weight: 700; }
    .fav-rm { position: absolute; top: 6px; right: 6px; width: 26px; height: 26px; border-radius: 50%; border: 2px solid var(--ink); background: #fff; color: var(--pink, #ff6bb5); cursor: pointer; z-index: 2; font-size: 13px; }
  </style>
</head>
<body>
  <main class="page">
    <header class="brand">
      <a href="index.html" style="display:flex;align-items:center;gap:.6rem;text-decoration:none;color:inherit;">
        <div class="brand-logo">
          <svg class="suitcase" viewBox="0 0 48 48" width="26" height="26" role="img" aria-label="Fitinerary suitcase">
            <rect class="case-interior" x="12" y="20" width="24" height="9" rx="2" fill="#ff6bb5"/>
            <g class="case-body">
              <rect x="10" y="22" width="28" height="17" rx="4" fill="#ffffff" stroke="#2c2250" stroke-width="2"/>
              <line x1="19.5" y1="23" x2="19.5" y2="38" stroke="#2c2250" stroke-width="1.3" opacity="0.22"/>
              <line x1="28.5" y1="23" x2="28.5" y2="38" stroke="#2c2250" stroke-width="1.3" opacity="0.22"/>
            </g>
            <g class="case-lid">
              <path d="M20 15 v-3 a4 4 0 0 1 8 0 v3" fill="none" stroke="#2c2250" stroke-width="2.4" stroke-linecap="round"/>
              <rect x="10" y="15" width="28" height="9" rx="4" fill="#ffffff" stroke="#2c2250" stroke-width="2"/>
              <rect x="20.5" y="19" width="7" height="3.5" rx="1" fill="#00c4cc" stroke="#2c2250" stroke-width="1.1"/>
            </g>
          </svg>
        </div>
        <span class="brand-name">Fitinerary</span>
      </a>
      <a href="pack.html" class="saved-link">✈︎ Plan a trip</a>
      <div class="brand-badge">♥ saved</div>
    </header>

    <h2 class="sec-title">🧳 Saved trips</h2>
    <div id="tripsWrap"></div>

    <h2 class="sec-title">♥ Favourite pieces</h2>
    <div id="favsWrap"></div>
  </main>

  <script>
    const get = k => { try { return JSON.parse(localStorage.getItem(k) || '[]'); } catch { return []; } };
    const set = (k, v) => localStorage.setItem(k, JSON.stringify(v));
    const EMOJIS = { Tokyo:'🗼', 'New York':'🗽', London:'🎡', Paris:'🗼', Bali:'🌴' };
    const fmtDate = s => s ? new Date(s + 'T00:00:00').toLocaleDateString('en-US', { month:'short', day:'numeric' }) : '';

    function renderTrips() {
      const trips = get('fitinerary_trips'), w = document.getElementById('tripsWrap');
      if (!trips.length) { w.innerHTML = '<div class="empty">No saved trips yet. Plan one and tap “💾 Save trip” on your results.</div>'; return; }
      w.innerHTML = trips.map((t, i) => {
        const tr = t.trip;
        const nights = Math.round((new Date(tr.return) - new Date(tr.departure)) / 86400000);
        const vibes = (tr.vibes || (tr.vibe ? [tr.vibe] : [])).join(' · ');
        return `<div class="trip-card">
          <span class="tc-emoji">${EMOJIS[tr.destination.name] || '📍'}</span>
          <div class="tc-main">
            <div class="tc-dest">${tr.destination.name}</div>
            <div class="tc-dates">${fmtDate(tr.departure)} → ${fmtDate(tr.return)} · ${nights} nights</div>
            ${vibes ? `<div class="tc-tags">${vibes}</div>` : ''}
          </div>
          <button class="tc-open" onclick="openTrip(${i})">Open →</button>
          <button class="tc-rm" onclick="rmTrip(${i})" aria-label="Remove">✕</button>
        </div>`;
      }).join('');
    }
    function openTrip(i) {
      const t = get('fitinerary_trips')[i]; if (!t) return;
      localStorage.setItem('fitinerary_data', JSON.stringify(t.trip));
      location.href = 'results.html';
    }
    function rmTrip(i) { const a = get('fitinerary_trips'); a.splice(i, 1); set('fitinerary_trips', a); renderTrips(); }

    function renderFavs() {
      const favs = get('fitinerary_faves'), w = document.getElementById('favsWrap');
      if (!favs.length) { w.innerHTML = '<div class="empty">No favourites yet. Tap the ♥ on any piece in your style edit to save it here.</div>'; return; }
      w.innerHTML = '<div class="fav-grid">' + favs.map((f, i) => `
        <div class="fav-wrap">
          <button class="fav-rm" onclick="rmFav(${i})" aria-label="Remove">♥</button>
          <a class="fav-card" href="${f.url}" target="_blank" rel="noopener">
            <div class="fav-img" style="background-image:url('${f.img}')"></div>
            <div class="fav-info">
              <span class="fav-name">${f.name}</span>
              <span class="fav-meta"><span class="fav-price">${f.price}</span><span class="fav-store">${f.store}</span></span>
            </div>
          </a>
        </div>`).join('') + '</div>';
    }
    function rmFav(i) { const a = get('fitinerary_faves'); a.splice(i, 1); set('fitinerary_faves', a); renderFavs(); }

    renderTrips();
    renderFavs();
  </script>
</body>
</html>
